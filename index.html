<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>GRAND SLOT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="machine">
  <h1>🎰 GRAND SLOT</h1>

  <div class="balance">
    CREDIT: <span id="money">1,000,000</span>
  </div>

  <div class="reels">
    <div class="reel" id="r1">7</div>
    <div class="reel" id="r2">BAR</div>
    <div class="reel" id="r3">7</div>
  </div>

  <div class="controls">
    <button onclick="bet()">BET</button>
    <button onclick="spin()" class="spin">SPIN</button>
  </div>

  <p id="msg"></p>
</div>

<script src="script.js"></script>
</body>
</html>
