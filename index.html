<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Slot Machine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="machine">

  <!-- 슬롯 머신 본체 이미지 -->
  <img src="slot-machine.png" class="bg">

  <!-- 슬롯 결과 (화면 중앙) -->
  <div class="slots">
    <span id="s1">7</span>
    <span id="s2">7</span>
    <span id="s3">7</span>
  </div>

  <!-- 잔액 -->
  <div class="money">₩ <span id="money">500000</span></div>

  <!-- 스핀 버튼 (이미지 버튼 위치에 맞춤) -->
  <button class="spin" onclick="spin()">SPIN</button>

</div>

<script src="script.js"></script>
</body>
</html>
