<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사이버 도박 예방</title>
  <style>
    body { 
      font-family: Arial; 
      text-align: center; 
      margin: 0;
      background: radial-gradient(circle, #111, #000);
      color: #ff3b3b;
    }

    header {
      background: #111;
      padding: 15px;
      border-bottom: 2px solid red;
    }

    nav button {
      background: black;
      color: red;
      border: 1px solid red;
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }

    .hidden { display: none; }

    .slot {
      font-size: 60px;
      margin: 10px;
      color: white;
      display: inline-block;
      width: 40px;
    }

    #result {
      margin-top: 20px;
      font-size: 30px;
      color: white;
      height: 40px;
    }

    .flash {
      animation: flash 0.2s infinite;
    }

    @keyframes flash {
      0% { color: red; }
      50% { color: white; }
      100% { color: red; }
    }
  </style>
</head>
<body>

<header>
  <nav>
    <button onclick="openCharge()">메뉴 - 충전</button>
    <button onclick="openGameMenu()">메뉴 - 다른 게임</button>
  </nav>
</header>

<h1>불법 도박 사이트</h1>
<h2 id="balance">잔액: 200,000원</h2>

<!-- 슬롯 -->
<div id="slotGame">
  <h2>슬롯 머신</h2>
  <div>
    <span class="slot" id="s1">0</span>
    <span class="slot" id="s2">0</span>
    <span class="slot" id="s3">0</span>
  </div>
  <button onclick="spin()">돌리기</button>
</div>

<!-- 룰렛 -->
<div id="rouletteGame" class="hidden">
  <h2>룰렛</h2>
  <div id="rouletteResult" class="slot">?</div>
  <button onclick="playRoulette()">돌리기</button>
</div>

<!-- 카드 -->
<div id="cardGame" class="hidden">
  <h2>카드 뽑기</h2>
  <button onclick="pickCard('red')">빨강</button>
  <button onclick="pickCard('blue')">파랑</button>
</div>

<div id="result"></div>

<script>
let balance = 200000;
let chargeCount = 0;
let playCount = 0;

function format(num) {
  return num.toLocaleString();
}

function updateBalance() {
  document.getElementById('balance').innerText = '잔액: ' + format(balance) + '원';
}

// 슬롯 애니메이션
function animateSlots(callback) {
  let count = 0;
  let interval = setInterval(() => {
    document.getElementById('s1').innerText = Math.floor(Math.random()*10);
    document.getElementById('s2').innerText = Math.floor(Math.random()*10);
    document.getElementById('s3').innerText = Math.floor(Math.random()*10);
    count++;
    if (count > 10) {
      clearInterval(interval);
      callback();
    }
  }, 80);
}

function spin() {
  if (balance < 10000) {
    alert('잔액 부족!');
    return;
  }

  balance -= 10000;
  playCount++;

  animateSlots(() => {
    let win = playCount < 5 ? true : Math.random() < 0.05; // 초반 당첨 유도

    let n1, n2, n3;

    if (win) {
      n1 = n2 = n3 = Math.floor(Math.random() * 10);
      balance += 50000;
      document.getElementById('result').innerText = '당첨!';
    } else {
      n1 = Math.floor(Math.random() * 10);
      n2 = Math.floor(Math.random() * 10);
      n3 = Math.floor(Math.random() * 10);
      if (n1 === n2 && n2 === n3) n3 = (n3 + 1) % 10;

      document.getElementById('result').innerText = '꽝';
    }

    document.getElementById('s1').innerText = n1;
    document.getElementById('s2').innerText = n2;
    document.getElementById('s3').innerText = n3;

    updateBalance();

    if (balance <= 0) {
      document.getElementById('result').innerText = '이미 모든 돈을 잃었습니다';
      document.getElementById('result').classList.add('flash');
    }
  });
}

// 룰렛 (거의 당첨 연출)
function playRoulette() {
  if (balance < 10000) return alert('잔액 부족!');

  balance -= 10000;
  let display = document.getElementById('rouletteResult');

  let spins = ['꽝','꽝','당첨','꽝','꽝'];
  let i = 0;

  let interval = setInterval(() => {
    display.innerText = spins[Math.floor(Math.random()*spins.length)];
    i++;
    if (i > 15) {
      clearInterval(interval);

      let win = Math.random() < 0.2;
      display.innerText = win ? '당첨' : '꽝';

      if (win) balance += 30000;
      document.getElementById('result').innerText = display.innerText;
      updateBalance();
    }
  }, 100);
}

// 카드
function pickCard(choice) {
  if (balance < 10000) return alert('잔액 부족!');

  balance -= 10000;
  playCount++;

  let win = playCount < 5 ? true : Math.random() < 0.3;

  if (win) {
    balance += 20000;
    document.getElementById('result').innerText = '당첨!';
  } else {
    document.getElementById('result').innerText = '꽝';
  }

  updateBalance();
}

// 충전
function openCharge() {
  if (chargeCount >= 3) {
    alert('잔액 부족');
    return;
  }

  let card = prompt('카드 번호 입력 (XXXX-XXXX-XXXX-XXXX)');

  if (card) {
    chargeCount++;
    balance += 100000;
    alert('충전 되었습니다');
    updateBalance();
  }
}

// 메뉴
function openGameMenu() {
  let game = prompt('게임 선택: 슬롯 / 룰렛 / 카드');

  document.getElementById('slotGame').classList.add('hidden');
  document.getElementById('rouletteGame').classList.add('hidden');
  document.getElementById('cardGame').classList.add('hidden');

  if (game === '룰렛') {
    document.getElementById('rouletteGame').classList.remove('hidden');
  } else if (game === '카드') {
    document.getElementById('cardGame').classList.remove('hidden');
  } else {
    document.getElementById('slotGame').classList.remove('hidden');
  }
}
</script>

</body>
</html>
