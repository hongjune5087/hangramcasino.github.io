<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Slot Machine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="machine">
  <!-- 배경 이미지 -->
  <img src="slot.png" class="bg">

  <!-- 잔액 -->
  <div class="money">₩ <span id="money">1000000</span></div>

  <!-- 결과 (슬롯 위에 겹침) -->
  <div class="result" id="result">---</div>

  <!-- SPIN 버튼 (위치 맞춤) -->
  <button class="spin-btn" onclick="spin()">SPIN</button>
</div>

<script src="script.js"></script>
</body>
</html>
