<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사이버 도박 예방</title>
  <style>
    body { 
      font-family: Arial; 
      text-align: center; 
      margin: 0;
      background: radial-gradient(circle, #111, #000);
      color: #ff3b3b;
    }

    header { background:#111; padding:15px; border-bottom:2px solid red; }
    nav span { color:red; margin:0 10px; cursor:pointer; border-bottom:1px solid red; }

    .hidden { display:none; }

    .slot { font-size:60px; margin:10px; color:white; display:inline-block; width:40px; }

    #result { margin-top:20px; font-size:30px; color:white; height:40px; }

    .wheel {
      width:220px;
      height:220px;
      border:5px solid red;
      border-radius:50%;
      margin:20px auto;
      position:relative;
      transition: transform 3s ease-out;
      overflow:hidden;
    }

    .pointer {
      width:0;
      height:0;
      border-left:10px solid transparent;
      border-right:10px solid transparent;
      border-top:20px solid yellow;
      margin:0 auto;
    }

    .segment {
      position:absolute;
      width:50%;
      height:50%;
      transform-origin:100% 100%;
      font-size:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
    }

    #loginScreen { margin-top:150px; }
    input { padding:10px; margin:5px; }
    button { padding:10px 20px; margin:10px; }
  </style>
</head>
<body>

<div id="loginScreen">
  <h1>회원 로그인</h1>
  <input id="id" placeholder="아이디"><br>
  <input id="pw" type="password" placeholder="비밀번호"><br>
  <button onclick="login()">로그인</button>
  <div id="loginMsg"></div>
</div>

<div id="main" class="hidden">

<header>
  <nav>
    <span onclick="openCharge()">충전</span>
    <span onclick="showGame('slot')">슬롯</span>
    <span onclick="showGame('roulette')">룰렛</span>
    <span onclick="showGame('card')">카드</span>
  </nav>
</header>

<h1>불법 도박 사이트</h1>
<h2 id="balance">잔액: 200,000원</h2>

<div id="slotGame">
  <h2>슬롯 머신</h2>
  <div>
    <span class="slot" id="s1">0</span>
    <span class="slot" id="s2">0</span>
    <span class="slot" id="s3">0</span>
  </div>
  <button onclick="spin()">돌리기</button>
</div>

<div id="rouletteGame" class="hidden">
  <h2>룰렛 (20칸)</h2>
  <div class="pointer"></div>
  <div id="wheel" class="wheel"></div>
  <button onclick="playRoulette()">돌리기</button>
</div>

<div id="cardGame" class="hidden">
  <h2>카드 뽑기</h2>
  <button onclick="pickCard()">카드 뽑기</button>
</div>

<div id="result"></div>

</div>

<script>
let balance = 200000;
let chargeCount = 0;
let slotCounter = 0;

const wheel = document.getElementById('wheel');
const loginScreen = document.getElementById('loginScreen');
const main = document.getElementById('main');
const result = document.getElementById('result');
const balanceEl = document.getElementById('balance');
const slotGame = document.getElementById('slotGame');
const rouletteGame = document.getElementById('rouletteGame');
const cardGame = document.getElementById('cardGame');

function initWheel(){
  wheel.innerHTML='';
  for(let i=0;i<20;i++){
    let seg=document.createElement('div');
    seg.className='segment';
    seg.style.transform='rotate('+(i*18)+'deg) skewY(-72deg)';
    seg.innerText=(i===0)?'당첨':'꽝';
    seg.style.background=(i===0)?'green':'black';
    wheel.appendChild(seg);
  }
}
initWheel();

function format(num){return num.toLocaleString();}
function updateBalance(){
  balanceEl.innerText='잔액: '+format(balance)+'원';
}

function login(){
  const id=document.getElementById('id').value;
  const pw=document.getElementById('pw').value;

  if(id && pw){
    loginScreen.classList.add('hidden');
    main.classList.remove('hidden');
  } else {
    document.getElementById('loginMsg').innerText='로그인 실패';
  }
}

function showGame(g){
  slotGame.classList.add('hidden');
  rouletteGame.classList.add('hidden');
  cardGame.classList.add('hidden');

  if(g==='roulette') rouletteGame.classList.remove('hidden');
  else if(g==='card') cardGame.classList.remove('hidden');
  else slotGame.classList.remove('hidden');
}

function animateSlots(cb){
  let c=0;
  let i=setInterval(()=>{
    s1.innerText=Math.floor(Math.random()*10);
    s2.innerText=Math.floor(Math.random()*10);
    s3.innerText=Math.floor(Math.random()*10);
    if(++c>10){clearInterval(i);cb();}
  },80);
}

function spin(){
  if(balance<10000) return alert('잔액 부족!');
  balance-=10000; slotCounter++;

  animateSlots(()=>{
    let win=(slotCounter%15===0);
    let n1,n2,n3;

    if(win){
      n1=n2=n3=Math.floor(Math.random()*10);
      balance+=50000;
      result.innerText='당첨!';
    } else {
      n1=Math.floor(Math.random()*10);
      n2=Math.floor(Math.random()*10);
      n3=Math.floor(Math.random()*10);
      if(n1===n2&&n2===n3)n3=(n3+1)%10;
      result.innerText='꽝';
    }

    s1.innerText=n1;
    s2.innerText=n2;
    s3.innerText=n3;
    updateBalance();
  });
}

function playRoulette(){
  if(balance<10000) return alert('잔액 부족!');
  balance-=10000;

  let winIndex=Math.floor(Math.random()*20);
  let spins=720+Math.random()*360;
  let finalDeg=spins+(winIndex*18);

  wheel.style.transform='rotate('+finalDeg+'deg)';

  setTimeout(()=>{
    if(winIndex===0){
      balance+=30000;
      result.innerText='당첨!';
    } else {
      result.innerText='꽝';
    }

    updateBalance();
  },3000);
}

function pickCard(){
  if(balance<10000) return alert('잔액 부족!');
  balance-=10000;

  let win=Math.random()<0.3;

  result.innerText=win?'당첨!':'꽝';
  if(win) balance+=20000;

  updateBalance();
}

function openCharge(){
  if(chargeCount>=3) return alert('잔액 부족');

  let amount = prompt('충전 금액 입력 (숫자)');
  let card = prompt('카드 번호 입력 (XXXX-XXXX-XXXX-XXXX)');

  amount = parseInt(amount);

  if(card && !isNaN(amount) && amount>0){
    chargeCount++;
    balance += amount;
    alert('충전 되었습니다');
    updateBalance();
  }
}
</script>

</body>
</html>
