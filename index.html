<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사이버 도박 예방</title>

<style>
body{
  margin:0;
  background:#000;
  color:red;
  text-align:center;
}

.hidden{display:none;}

header{
  background:#111;
  padding:15px;
  border-bottom:2px solid red;
}

nav span{
  color:red;
  margin:0 10px;
  cursor:pointer;
  border-bottom:1px solid red;
}

.reel{
  display:inline-block;
  width:60px;
  height:80px;
  overflow:hidden;
  border:2px solid red;
}

.numbers div{
  height:80px;
  font-size:40px;
  color:white;
}

.flash{animation:flash 0.3s 3;}
@keyframes flash{50%{background:#300;}}

.card{
  width:120px; height:180px;
  margin:auto;
  transform-style:preserve-3d;
  transition:0.8s;
}
.card.flipped{transform:rotateY(180deg);}
.front,.back{
  position:absolute;
  width:100%; height:100%;
  backface-visibility:hidden;
  border:2px solid red;
}
.back{transform:rotateY(180deg);}
</style>
</head>

<body>

<!-- 로그인 -->
<div id="loginScreen">
<h2>로그인</h2>
<input id="id"><br>
<input id="pw" type="password"><br>
<button onclick="login()">로그인</button>
<div id="loginMsg"></div>
</div>

<!-- 메인 -->
<div id="main" class="hidden">

<header>
<nav>
<span onclick="openCharge()">충전</span>
<span onclick="showGame('slot')">슬롯</span>
<span onclick="showGame('roulette')">룰렛</span>
<span onclick="showGame('card')">카드</span>
</nav>
</header>

<h2 id="balance">잔액: 200,000원</h2>

<!-- 슬롯 -->
<div id="slotGame">
<div>
<div class="reel"><div id="r1"></div></div>
<div class="reel"><div id="r2"></div></div>
<div class="reel"><div id="r3"></div></div>
</div>
<button onclick="spin()">돌리기</button>
</div>

<!-- 룰렛 -->
<div id="rouletteGame" class="hidden">
<h2>룰렛 (테스트용)</h2>
<button onclick="playRoulette()">돌리기</button>
</div>

<!-- 카드 -->
<div id="cardGame" class="hidden">
<div class="card" id="card">
<div class="front">CARD</div>
<div class="back" id="cardBack">?</div>
</div>
<br>
<button onclick="pickCard('red')">레드</button>
<button onclick="pickCard('black')">블랙</button>
</div>

<div id="result"></div>

</div>

<script>
let balance=200000;
let count=0;
let chargeCount=0;

const result=document.getElementById('result');
const balanceEl=document.getElementById('balance');
const card=document.getElementById('card');
const cardBack=document.getElementById('cardBack');

function update(){
  balanceEl.innerText="잔액: "+balance.toLocaleString()+"원";
}

/* 로그인 */
function login(){
  let id=document.getElementById('id').value;
  let pw=document.getElementById('pw').value;

  if(id && pw){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
  }else{
    document.getElementById('loginMsg').innerText="로그인 실패";
  }
}

/* 메뉴 */
function showGame(g){
  document.getElementById('slotGame').classList.add('hidden');
  document.getElementById('rouletteGame').classList.add('hidden');
  document.getElementById('cardGame').classList.add('hidden');

  if(g==='roulette') document.getElementById('rouletteGame').classList.remove('hidden');
  else if(g==='card') document.getElementById('cardGame').classList.remove('hidden');
  else document.getElementById('slotGame').classList.remove('hidden');
}

/* 슬롯 */
function fill(el){
  el.innerHTML="";
  for(let i=0;i<20;i++){
    let d=document.createElement('div');
    d.innerText=Math.floor(Math.random()*10);
    el.appendChild(d);
  }
}

function spin(){
  if(balance<10000)return alert("잔액 부족");

  balance-=10000;
  count++;

  let r1=document.getElementById('r1');
  let r2=document.getElementById('r2');
  let r3=document.getElementById('r3');

  fill(r1); fill(r2); fill(r3);

  let i=0;
  let loop=setInterval(()=>{
    i++;

    r1.style.transform=`translateY(${-i*80}px)`;
    r2.style.transform=`translateY(${-((i+5)%20)*80}px)`;
    r3.style.transform=`translateY(${-((i+10)%20)*80}px)`;

    if(i>=20){
      clearInterval(loop);

      let win=(count%15==0);

      if(win){
        let n=Math.floor(Math.random()*10);
        r1.style.transform=`translateY(${-n*80}px)`;
        r2.style.transform=`translateY(${-n*80}px)`;
        r3.style.transform=`translateY(${-n*80}px)`;

        balance+=50000;
        result.innerText="당첨!";
      }else{
        result.innerText="꽝";
      }

      update();
    }
  },80);
}

/* 카드 */
function pickCard(type){
  if(balance<10000)return alert("잔액 부족");

  balance-=10000;

  card.classList.remove('flipped');

  setTimeout(()=>{
    let win=(type=="red")?Math.random()<0.35:Math.random()<0.25;

    cardBack.innerText=(win?"당첨":"꽝");
    card.classList.add('flipped');

    if(win) balance+=20000;

    result.innerText=win?"당첨!":"꽝";
    update();
  },300);
}

/* 룰렛 */
function playRoulette(){
  if(balance<10000)return alert("잔액 부족");
  balance-=10000;

  let win=Math.random()<0.1;

  if(win){
    balance+=30000;
    result.innerText="당첨!";
  }else{
    result.innerText="꽝";
  }

  update();
}

/* 충전 */
function openCharge(){
  if(chargeCount>=3)return alert("잔액 부족");

  let money=prompt("충전 금액");
  let card=prompt("카드 번호 (XXXX-XXXX-XXXX-XXXX)");

  money=parseInt(money);

  if(card && money>0){
    balance+=money;
    chargeCount++;
    alert("충전 되었습니다");
    update();
  }
}
</script>

</body>
</html>
