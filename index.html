<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사이버 도박 예방 슬롯</title>
  <style>
    body { 
      font-family: Arial; 
      text-align: center; 
      margin-top: 50px; 
      background-color: black; 
      color: white;
    }
    .slot { font-size: 40px; margin: 10px; }
    button { padding: 10px 20px; margin: 10px; }
  </style>
</head>
<body>

<h1>슬롯 머신 (교육용)</h1>
<h2 id="balance">잔액: 200000원</h2>

<div>
  <span class="slot" id="s1">0</span>
  <span class="slot" id="s2">0</span>
  <span class="slot" id="s3">0</span>
</div>

<button onclick="spin()">돌리기</button>
<button onclick="charge()">돈 충전</button>

<script>
let balance = 200000;

function updateBalance() {
  document.getElementById('balance').innerText = '잔액: ' + balance + '원';
}

function spin() {
  if (balance < 10000) {
    alert('잔액 부족!');
    return;
  }

  balance -= 10000;

  let win = Math.random() < 0.05; // 5% 확률

  let n1, n2, n3;

  if (win) {
    n1 = n2 = n3 = Math.floor(Math.random() * 10);
    balance += 50000;
    alert('당첨! (5% 확률)');
  } else {
    n1 = Math.floor(Math.random() * 10);
    n2 = Math.floor(Math.random() * 10);
    n3 = Math.floor(Math.random() * 10);

    if (n1 === n2 && n2 === n3) {
      n3 = (n3 + 1) % 10;
    }

    alert('꽝');
  }

  document.getElementById('s1').innerText = n1;
  document.getElementById('s2').innerText = n2;
  document.getElementById('s3').innerText = n3;

  updateBalance();
}

function charge() {
  balance += 100000;
  alert('충전 되었습니다');
  updateBalance();
}
</script>

</body>
</html>
