<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사이버 도박 예방 슬롯</title>
  <style>
    body { 
      font-family: Arial; 
      text-align: center; 
      margin: 0;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      color: #ff3b3b;
    }

    header {
      background: #111;
      padding: 15px;
      border-bottom: 2px solid red;
    }

    nav button {
      background: black;
      color: red;
      border: 1px solid red;
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }

    .slot { font-size: 50px; margin: 10px; color: white; }
    button.main { padding: 10px 20px; margin: 10px; }
  </style>
</head>
<body>

<header>
  <nav>
    <button onclick="openCharge()">메뉴 - 충전</button>
    <button onclick="alert('다른 게임 준비중...')">메뉴 - 다른 게임</button>
  </nav>
</header>

<h1>불법 슬롯 머신</h1>
<h2 id="balance">잔액: 200,000원</h2>

<div>
  <span class="slot" id="s1">0</span>
  <span class="slot" id="s2">0</span>
  <span class="slot" id="s3">0</span>
</div>

<button class="main" onclick="spin()">돌리기</button>

<script>
let balance = 200000;
let chargeCount = 0;

function format(num) {
  return num.toLocaleString();
}

function updateBalance() {
  document.getElementById('balance').innerText = '잔액: ' + format(balance) + '원';
}

function spin() {
  if (balance < 10000) {
    alert('잔액 부족!');
    return;
  }

  balance -= 10000;

  let win = Math.random() < 0.05;

  let n1, n2, n3;

  if (win) {
    n1 = n2 = n3 = Math.floor(Math.random() * 10);
    balance += 50000;
    alert('당첨!');
  } else {
    n1 = Math.floor(Math.random() * 10);
    n2 = Math.floor(Math.random() * 10);
    n3 = Math.floor(Math.random() * 10);

    if (n1 === n2 && n2 === n3) {
      n3 = (n3 + 1) % 10;
    }

    // 사이트 내 메시지 느낌 (alert 대신 confirm)
    confirm('꽝');
  }

  document.getElementById('s1').innerText = n1;
  document.getElementById('s2').innerText = n2;
  document.getElementById('s3').innerText = n3;

  updateBalance();
}

function openCharge() {
  if (chargeCount >= 3) {
    alert('잔액 부족');
    return;
  }

  let card = prompt('카드 번호 입력 (XXXX-XXXX-XXXX-XXXX)');

  if (card) {
    chargeCount++;
    balance += 100000;
    alert('충전 되었습니다');
    updateBalance();
  }
}
</script>

</body>
</html>
