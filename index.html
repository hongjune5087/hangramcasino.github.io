<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사이버 도박 예방</title>
  <style>
    body { 
      font-family: Arial; 
      text-align: center; 
      margin: 0;
      background: radial-gradient(circle, #111, #000);
      color: #ff3b3b;
      overflow-x:hidden;
    }

    .flash { animation: flash 0.3s 3; }
    @keyframes flash {
      0% { background:#000; }
      50% { background:#330000; }
      100% { background:#000; }
    }

    header { background:#111; padding:15px; border-bottom:2px solid red; }
    nav span { color:red; margin:0 10px; cursor:pointer; border-bottom:1px solid red; }

    .hidden { display:none; }

    /* 슬롯 */
    .reel {
      display:inline-block;
      width:50px;
      height:80px;
      overflow:hidden;
      border:2px solid red;
      margin:5px;
      background:#000;
      position:relative;
    }

    .numbers {
      position:absolute;
      width:100%;
      transition: top 0.5s ease-out;
    }

    .numbers div {
      height:80px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      color:white;
    }

    #result { margin-top:20px; font-size:30px; color:white; height:40px; }

    /* 잔액 애니메이션 */
    .money-change {
      animation: pop 0.3s;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); color:yellow; }
      100% { transform: scale(1); }
    }

    /* 카드 */
    .card-area{ perspective:1000px; margin-top:20px; }
    .card{ width:140px;height:200px;margin:0 auto;position:relative;transform-style:preserve-3d;transition: transform 0.8s; }
    .card.flipped{ transform: rotateY(180deg); }
    .inner{ width:100%; height:100%; position:absolute; transform-style:preserve-3d; }
    .front, .back{ position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid red;border-radius:10px; }
    .front{ background:#111; }
    .back{ transform: rotateY(180deg); background:#222; color:white; white-space:pre; }

    #loginScreen { margin-top:150px; }
    input { padding:10px; margin:5px; }
    button { padding:10px 20px; margin:10px; }
  </style>
</head>
<body>

<div id="loginScreen">
  <h1>회원 로그인</h1>
  <input id="id" placeholder="아이디"><br>
  <input id="pw" type="password" placeholder="비밀번호"><br>
  <button onclick="login()">로그인</button>
  <div id="loginMsg"></div>
</div>

<div id="main" class="hidden">

<header>
  <nav>
    <span onclick="openCharge()">충전</span>
    <span onclick="showGame('slot')">슬롯</span>
    <span onclick="showGame('roulette')">룰렛</span>
    <span onclick="showGame('card')">카드</span>
  </nav>
</header>

<h1>불법 도박 사이트</h1>
<h2 id="balance">잔액: 200,000원</h2>

<div id="slotGame">
  <h2>슬롯 머신</h2>
  <div>
    <div class="reel"><div class="numbers" id="r1"></div></div>
    <div class="reel"><div class="numbers" id="r2"></div></div>
    <div class="reel"><div class="numbers" id="r3"></div></div>
  </div>
  <button onclick="spin()">돌리기</button>
</div>

<div id="cardGame" class="hidden">
  <h2>카드 뽑기</h2>
  <div class="card-area">
    <div id="card" class="card">
      <div class="inner">
        <div class="front">CARD</div>
        <div class="back" id="cardBack">?</div>
      </div>
    </div>
  </div>
  <button onclick="pickCard('red')">레드 카드</button>
  <button onclick="pickCard('black')">블랙 카드</button>
</div>

<div id="result"></div>

</div>

<script>
let balance = 200000;
let chargeCount = 0;
let slotCounter = 0;

const result = document.getElementById('result');
const balanceEl = document.getElementById('balance');
const card = document.getElementById('card');
const cardBack = document.getElementById('cardBack');

/* 효과음 */
const spinSound = new Audio('https://actions.google.com/sounds/v1/casino/slot_machine.ogg');
const winSound = new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg');

function format(num){return num.toLocaleString();}
function updateBalance(){ 
  balanceEl.innerText='잔액: '+format(balance)+'원';
  balanceEl.classList.add('money-change');
  setTimeout(()=>balanceEl.classList.remove('money-change'),300);
}

function login(){
  const id=document.getElementById('id').value;
  const pw=document.getElementById('pw').value;
  if(id && pw){
    loginScreen.classList.add('hidden');
    main.classList.remove('hidden');
  } else {
    document.getElementById('loginMsg').innerText='로그인 실패';
  }
}

function showGame(g){
  slotGame.classList.add('hidden');
  cardGame.classList.add('hidden');
  if(g==='card') cardGame.classList.remove('hidden');
  else slotGame.classList.remove('hidden');
}

function fillReel(el){
  el.innerHTML='';
  for(let i=0;i<20;i++){
    let d=document.createElement('div');
    d.innerText=Math.floor(Math.random()*10);
    el.appendChild(d);
  }
}

function spin(){
  if(balance<10000) return alert('잔액 부족!');
  balance-=10000; slotCounter++;

  spinSound.currentTime=0;
  spinSound.play();

  const r1=document.getElementById('r1');
  const r2=document.getElementById('r2');
  const r3=document.getElementById('r3');

  fillReel(r1); fillReel(r2); fillReel(r3);

  let win=(slotCounter%15===0);

  setTimeout(()=>{
    let n=Math.floor(Math.random()*10);

    if(win){
      result.innerText='당첨!';
      balance+=50000;
      document.body.classList.add('flash');
      winSound.play();
      setTimeout(()=>document.body.classList.remove('flash'),500);
    } else {
      result.innerText='꽝';
    }

    r1.style.top = -(n*80)+'px';
    r2.style.top = -(n*80)+'px';
    r3.style.top = -(n*80)+'px';

    updateBalance();
  },500);
}

function pickCard(choice){
  if(balance<10000) return alert('잔액 부족!');
  balance-=10000;

  card.classList.remove('flipped');
  cardBack.innerText='';

  setTimeout(()=>{
    let win = (choice==='red') ? Math.random()<0.35 : Math.random()<0.25;
    cardBack.innerText = choice.toUpperCase()+'\n'+(win?'당첨':'꽝');
    card.classList.add('flipped');

    if(win){
      balance+=20000;
      winSound.play();
      document.body.classList.add('flash');
      setTimeout(()=>document.body.classList.remove('flash'),500);
    }

    result.innerText=win?'당첨!':'꽝';
    updateBalance();
  },300);
}

function openCharge(){
  if(chargeCount>=3) return alert('잔액 부족');
  let amount = prompt('충전 금액 입력 (숫자)');
  let card = prompt('카드 번호 입력 (XXXX-XXXX-XXXX-XXXX)');
  amount=parseInt(amount);
  if(card && !isNaN(amount) && amount>0){
    chargeCount++;
    balance+=amount;
    alert('충전 되었습니다');
    updateBalance();
  }
}
</script>

</body>
</html>
