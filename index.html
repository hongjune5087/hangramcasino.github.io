<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카지노 체험 (도박 예방)</title>

<style>
body {
  background: radial-gradient(circle, #1a0000, #000);
  color: gold;
  text-align: center;
  font-family: 'Arial';
}

h1 {
  margin-top: 30px;
  text-shadow: 0 0 10px red;
}

.roulette {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: 8px solid gold;
  margin: 50px auto;
  transition: transform 2s ease-out;
  box-shadow: 0 0 30px red;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 20px;
  cursor: pointer;
  border-radius: 10px;
  box-shadow: 0 0 10px red;
}

button:hover {
  background: darkred;
}

#result {
  margin-top: 30px;
  font-size: 22px;
}
</style>
</head>

<body>

<h1>🎰 카지노 룰렛</h1>
<p>※ 이 콘텐츠는 도박의 위험성을 알리기 위한 체험입니다</p>

<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Roulette_wheel.jpg"
     class="roulette" id="roulette">

<br>

<button onclick="spin()">베팅하기</button>

<div id="result"></div>

<script>
let angle = 0;

function spin() {
  let spinValue = Math.floor(Math.random() * 360) + 1080;
  angle += spinValue;

  document.getElementById("roulette").style.transform =
    "rotate(" + angle + "deg)";

  setTimeout(() => {
    let chance = Math.random();
    let resultText = "";

    if (chance < 0.85) {
      resultText = "❌ 잃었습니다...";
    } else {
      resultText = "🎉 당첨!";
    }

    document.getElementById("result").innerHTML =
      resultText + "<br><br>⚠ 계속하게 되면 멈출 수 없습니다.";
  }, 2000);
}
</script>

</body>
</html>
