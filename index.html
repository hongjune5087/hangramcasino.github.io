<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사이버 도박 예방</title>

<style>
body{
  margin:0;
  background:#000;
  color:red;
  text-align:center;
}

.hidden{display:none;}

.reel{
  display:inline-block;
  width:60px;
  height:80px;
  overflow:hidden;
  border:2px solid red;
  margin:5px;
}

.numbers{
  position:relative;
}

.numbers div{
  height:80px;
  font-size:40px;
  color:white;
}

.flash{animation:flash 0.3s 3;}
@keyframes flash{
  50%{background:#300;}
}

.money{transition:0.3s;}
.money.up{color:yellow; transform:scale(1.2);}

.card{
  width:120px; height:180px;
  margin:auto;
  transform-style:preserve-3d;
  transition:0.8s;
}
.card.flipped{transform:rotateY(180deg);}
.front,.back{
  position:absolute;
  width:100%; height:100%;
  backface-visibility:hidden;
  border:2px solid red;
}
.back{transform:rotateY(180deg);}
</style>
</head>

<body>

<!-- 로그인 -->
<div id="loginScreen">
<h2>로그인</h2>
<input id="id"><br>
<input id="pw" type="password"><br>
<button onclick="login()">로그인</button>
<div id="loginMsg"></div>
</div>

<!-- 메인 -->
<div id="main" class="hidden">

<h2 id="balance">잔액: 200,000원</h2>

<!-- 슬롯 -->
<div>
<div class="reel"><div id="r1" class="numbers"></div></div>
<div class="reel"><div id="r2" class="numbers"></div></div>
<div class="reel"><div id="r3" class="numbers"></div></div>
</div>

<button onclick="spin()">돌리기</button>

<!-- 카드 -->
<div class="card" id="card">
<div class="front">CARD</div>
<div class="back" id="cardBack">?</div>
</div>

<button onclick="pickCard('red')">레드</button>
<button onclick="pickCard('black')">블랙</button>

<div id="result"></div>

</div>

<script>
let balance=200000;
let count=0;

const balanceEl=document.getElementById('balance');
const result=document.getElementById('result');
const card=document.getElementById('card');
const cardBack=document.getElementById('cardBack');

function update(){
  balanceEl.innerText="잔액: "+balance.toLocaleString()+"원";
  balanceEl.classList.add('up');
  setTimeout(()=>balanceEl.classList.remove('up'),300);
}

/* 로그인 */
function login(){
  let id=document.getElementById('id').value;
  let pw=document.getElementById('pw').value;

  if(id && pw){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
  }else{
    document.getElementById('loginMsg').innerText="실패";
  }
}

/* 슬롯 */
function fill(el){
  el.innerHTML="";
  for(let i=0;i<20;i++){
    let d=document.createElement('div');
    d.innerText=Math.floor(Math.random()*10);
    el.appendChild(d);
  }
}

function spin(){
  if(balance<10000)return alert("잔액 부족");

  balance-=10000;
  count++;

  let r1=document.getElementById('r1');
  let r2=document.getElementById('r2');
  let r3=document.getElementById('r3');

  fill(r1); fill(r2); fill(r3);

  let i=0;
  let loop=setInterval(()=>{
    i++;

    r1.style.transform=`translateY(${-i*80}px)`;
    r2.style.transform=`translateY(${-((i+5)%20)*80}px)`;
    r3.style.transform=`translateY(${-((i+10)%20)*80}px)`;

    if(i>=20){
      clearInterval(loop);

      let win=(count%15==0);

      if(win){
        let n=Math.floor(Math.random()*10);
        r1.style.transform=`translateY(${-n*80}px)`;
        r2.style.transform=`translateY(${-n*80}px)`;
        r3.style.transform=`translateY(${-n*80}px)`;

        balance+=50000;
        result.innerText="당첨!";
        document.body.classList.add('flash');
        setTimeout(()=>document.body.classList.remove('flash'),300);
      }else{
        result.innerText="꽝";
      }

      update();
    }
  },80);
}

/* 카드 */
function pickCard(type){
  if(balance<10000)return alert("잔액 부족");

  balance-=10000;

  card.classList.remove('flipped');

  setTimeout(()=>{
    let win=(type=="red")?Math.random()<0.35:Math.random()<0.25;

    cardBack.innerText=(win?"당첨":"꽝");
    card.classList.add('flipped');

    if(win){
      balance+=20000;
      document.body.classList.add('flash');
      setTimeout(()=>document.body.classList.remove('flash'),300);
    }

    result.innerText=win?"당첨!":"꽝";
    update();
  },300);
}
</script>

</body>
</html>
