<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>룰렛 체험 (도박 예방 교육)</title>
<style>
  body {
    text-align: center;
    font-family: Arial;
    background: #111;
    color: white;
  }

  .roulette {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 10px solid #fff;
    margin: 50px auto;
    position: relative;
    overflow: hidden;
  }

  .section {
    position: absolute;
    width: 50%;
    height: 50%;
    transform-origin: 100% 100%;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>🎰 룰렛 체험</h1>
<p>※ 이 콘텐츠는 도박의 위험성을 알리기 위한 교육용입니다</p>

<div class="roulette" id="roulette"></div>

<button onclick="spin()">돌리기</button>

<h2 id="result"></h2>

<script>
const results = ["1", "2", "3", "4", "5", "6", "7", "8"];
const roulette = document.getElementById("roulette");

let angle = 0;

function spin() {
  let randomSpin = Math.floor(Math.random() * 360) + 720;
  angle += randomSpin;

  roulette.style.transform = `rotate(${angle}deg)`;

  setTimeout(() => {
    let index = Math.floor(Math.random() * results.length);
    let value = results[index];

    document.getElementById("result").innerText =
      "결과: " + value + "\n⚠ 계속하게 되면 중독될 수 있습니다!";
  }, 2000);
}
</script>

</body>
</html>
